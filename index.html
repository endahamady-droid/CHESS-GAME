<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INFO7 Online Chess</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="panel hero">
        <p class="eyebrow">INFO7 Online Chess</p>
        <h1>Play chess with your friends</h1>
        <p class="muted">Create an account, share a room code, and play online. Moves are checked by your C++ chess logic on the server.</p>
        <div class="server-status" id="serverStatus">Checking server...</div>
      </section>

      <section class="panel auth-panel" id="authPanel">
        <h2>Account</h2>
        <div class="grid two">
          <label>
            Username
            <input id="username" autocomplete="username" placeholder="alice">
          </label>
          <label>
            Password
            <input id="password" type="password" autocomplete="current-password" placeholder="1234">
          </label>
        </div>
        <div class="actions">
          <button id="loginBtn">Login</button>
          <button class="secondary" id="registerBtn">Create account</button>
        </div>
      </section>

      <section class="panel room-panel hidden" id="roomPanel">
        <div class="topline">
          <div>
            <p class="eyebrow">Logged in</p>
            <h2 id="playerName">Player</h2>
          </div>
          <button class="secondary" id="logoutBtn">Logout</button>
        </div>
        <div class="grid two">
          <button id="createRoomBtn">Create room</button>
          <label>
            Join code
            <span class="join-row">
              <input id="joinCode" maxlength="6" placeholder="ABC123">
              <button id="joinRoomBtn">Join</button>
            </span>
          </label>
        </div>
      </section>

      <section class="game-layout hidden" id="gamePanel">
        <section class="panel board-panel">
          <div class="topline">
            <div>
              <p class="eyebrow">Room <span id="roomCode">------</span></p>
              <h2 id="turnText">Waiting...</h2>
            </div>
            <button class="secondary" id="copyCodeBtn">Copy code</button>
          </div>
          <div class="board-wrap">
            <div class="board" id="board" aria-label="Chess board"></div>
          </div>
        </section>

        <aside class="panel side-panel">
          <h2>Game</h2>
          <p id="colorText" class="status-line">Your color: -</p>
          <p id="statusText" class="status-line">Status: -</p>
          <label>
            Manual move
            <span class="join-row">
              <input id="manualMove" maxlength="4" placeholder="e2e4">
              <button id="sendMoveBtn">Send</button>
            </span>
          </label>
          <h3>Moves</h3>
          <ol id="movesList" class="moves"></ol>
        </aside>
      </section>

      <p class="message" id="message"></p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
